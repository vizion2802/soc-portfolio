<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Post | SOC Field Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a05; --panel: #0f1a0f; --border: #1e3a1e;
      --green: #39ff5a; --text: #d4edda; --dim: #7fb87f;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-mono); line-height:1.7; }

    .nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:1.5rem 2rem; border-bottom:1px solid var(--border);
      background:rgba(15,26,15,0.8); backdrop-filter:blur(10px);
      position:sticky; top:0; z-index:10;
    }
    .nav h1 { font-family:var(--font-display); color:var(--green); font-size:1.2rem; }
    .nav a { color:var(--text); text-decoration:none; margin-left:1.5rem; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.2s; }
    .nav a:hover { color:var(--green); }

    .container { max-width:760px; margin:0 auto; padding:4rem 2rem 6rem; }

    .post-category {
      font-size:10px; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--dim); display:inline-block;
      border:1px solid rgba(127,184,127,0.3);
      padding:0.2rem 0.6rem; margin-bottom:1.25rem;
    }
    .post-title {
      font-family:var(--font-display); font-size:clamp(1.6rem,4vw,2.4rem);
      font-weight:800; color:#e8f5e8; line-height:1.1;
      letter-spacing:-0.03em; margin-bottom:0.75rem;
    }
    .post-meta {
      color:var(--dim); font-size:11px; letter-spacing:0.08em;
      margin-bottom:3rem; padding-bottom:1.5rem;
      border-bottom:1px solid var(--border);
    }
    .post-content { font-size:14px; line-height:1.9; color:var(--text); white-space:pre-line; }

    .back {
      display:inline-flex; align-items:center; gap:0.5rem;
      margin-top:4rem; padding:0.7rem 1.2rem;
      border:1px solid var(--border); color:var(--dim);
      text-decoration:none; font-size:11px;
      letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s;
    }
    .back:hover { border-color:var(--green); color:var(--green); }

    .loading { color:var(--dim); font-size:13px; padding:4rem 2rem; text-align:center; }
    .not-found { text-align:center; padding:6rem 2rem; }
    .not-found h2 { font-family:var(--font-display); color:var(--green); font-size:2rem; margin-bottom:1rem; }
    .not-found p { color:var(--dim); font-size:13px; margin-bottom:2rem; }
  </style>
</head>
<body>

<nav class="nav">
  <h1>SOC Blog</h1>
  <div>
    <a href="index.html">Portfolio</a>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<div id="post-container" class="loading">Loading post...</div>

<script>
var SUPABASE_URL  = "https://zocllfhpzsomhxtpyrdd.supabase.co";
var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvY2xsZmhwenNvbWh4dHB5cmRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjQzNTAsImV4cCI6MjA5NTM0MDM1MH0.A5iI1gRoE4rL6bmkmkB9O4GT01Sn2SHixr-EQK73RqQ";

async function loadPost() {
  var params    = new URLSearchParams(window.location.search);
  var id        = params.get("id");
  var from      = params.get("from") || "blog";
  var container = document.getElementById("post-container");

  try {
    var res = await fetch(
      SUPABASE_URL + "/rest/v1/blog_posts?id=eq." + id,
      {
        headers: {
          "apikey":        SUPABASE_ANON,
          "Authorization": "Bearer " + SUPABASE_ANON
        }
      }
    );

    var posts = await res.json();
    var post  = posts[0];

    if (!post) {
      container.className = "not-found";
      container.innerHTML = "<h2>Post Not Found</h2><p>This post may have been removed.</p><a class='back' href='blog.html'>← Back to Blog</a>";
      return;
    }

    document.title = post.title + " | SOC Field Notes";

    var backHref  = from === "portfolio" ? "index.html" : "blog.html";
    var backLabel = from === "portfolio" ? "← Portfolio" : "← Back to Blog";

    var article = document.createElement("div");
    article.className = "container";

    var cat = document.createElement("span");
    cat.className = "post-category";
    cat.textContent = post.category;

    var title = document.createElement("h1");
    title.className = "post-title";
    title.textContent = post.title;

    var meta = document.createElement("div");
    meta.className = "post-meta";
    meta.textContent = post.date;

    var content = document.createElement("div");
    content.className = "post-content";
    content.textContent = post.content;

    var back = document.createElement("a");
    back.className = "back";
    back.href = backHref;
    back.textContent = backLabel;

    article.append(cat, title, meta, content, back);
    container.className = "";
    container.appendChild(article);

  } catch (err) {
    container.className = "not-found";
    container.innerHTML = "<h2>Error</h2><p>Failed to load post. Please try again.</p><a class='back' href='blog.html'>← Back to Blog</a>";
    console.error(err);
  }
}

loadPost();
</script>

</body>
</html>
