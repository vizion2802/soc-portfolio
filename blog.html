<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | SOC Field Notes</title>
  <meta name="description" content="Cybersecurity field notes, write-ups, and SOC learning from Adeleke Theophilus." />

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050a05;
      --panel: #0f1a0f;
      --panel2: #131f13;
      --border: #1e3a1e;
      --green: #39ff5a;
      --green-mid: #22b836;
      --green-dim: #1a7a2a;
      --text: #d4edda;
      --dim: #7fb87f;
      --amber: #f5a623;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
    }

    /* ── NAV ── */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15,26,15,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-family: var(--font-display);
      color: var(--green);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-decoration: none;
    }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--green); }

    /* ── HERO ── */
    .hero {
      padding: 4rem 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green-mid);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .hero-label::before {
      content: '';
      height: 1px;
      width: 1.5rem;
      background: var(--green-mid);
    }

    .hero h2 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: #e8f5e8;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }

    .hero p {
      color: var(--dim);
      font-size: 13px;
      line-height: 1.7;
      max-width: 520px;
    }

    /* ── FILTER / SEARCH BAR ── */
    .controls {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 180px;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 0.5rem 0.8rem;
      gap: 0.5rem;
    }
    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      width: 100%;
      caret-color: var(--green);
    }
    .search-box span {
      color: var(--dim);
      font-size: 12px;
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active,
    .filter-btn:hover {
      border-color: var(--green-mid);
      color: var(--green);
      background: rgba(57,255,90,0.04);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      padding: 0 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      padding: 1.5rem;
      transition: background 0.2s;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px; height: 100%;
      background: transparent;
      transition: background 0.2s;
    }
    .card:hover { background: var(--panel2); }
    .card:hover::before { background: var(--amber); }

    .meta {
      font-size: 10px;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .cat-badge {
      color: var(--amber);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid rgba(245,166,35,0.3);
      padding: 0.15rem 0.4rem;
    }

    .post-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: #e8f5e8;
      line-height: 1.25;
      margin-bottom: 0.6rem;
    }

    .excerpt {
      font-size: 12px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 1.1rem;
    }

    .read-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .card:hover .read-link { color: var(--amber); }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      padding: 4rem 0;
      text-align: center;
      color: var(--dim);
      font-size: 13px;
    }

    /* ── FOOTER ── */
    .footer {
      max-width: 900px;
      margin: 3rem auto 0;
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.06em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .grid { padding: 0 1rem; }
      .controls { padding: 0 1rem 1.5rem; }
      .hero { padding: 2.5rem 1rem 2rem; }
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo">AT./</a>
  <div class="nav-links">
    <a href="index.html">Portfolio</a>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="hero-label">Field Notes</div>
  <h2>Cybersecurity<br>Journal</h2>
  <p>Write-ups, experiments, and lessons from the SOC learning journey.</p>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-box">
    <span>⌕</span>
    <input id="searchInput" type="text" placeholder="Search posts…" oninput="filterPosts()" />
  </div>
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('Intro', this)">Intro</button>
  <button class="filter-btn" onclick="setFilter('General', this)">General</button>
  <button class="filter-btn" onclick="setFilter('Tools', this)">Tools</button>
  <button class="filter-btn" onclick="setFilter('Threat Hunting', this)">Hunting</button>
</div>

<!-- BLOG GRID -->
<div class="grid" id="blog-container"></div>

<!-- FOOTER -->
<footer class="footer">
  <span>SOC Field Notes — Adeleke Theophilus</span>
  <span id="post-count" style="color:var(--green)"></span>
</footer>

<script>
sessionStorage.setItem("entryPoint", "blog");

let allPosts = [];
let activeFilter = "all";

function sanitize(str) {
  const d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function loadPosts() {
  const stored = localStorage.getItem("blogPosts");
  try {
    allPosts = stored ? JSON.parse(stored) : [];
  } catch {
    allPosts = [];
  }

  if (allPosts.length === 0) {
    allPosts = [{
      id: 1,
      title: "Welcome to My SOC Journey",
      content: "This blog tracks my cybersecurity learning — SOC analysis, threat hunting, and ML security systems. Each post is a log from the lab.",
      category: "Intro",
      date: new Date().toDateString()
    }];
    localStorage.setItem("blogPosts", JSON.stringify(allPosts));
  }

  render(allPosts);
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterPosts();
}

function filterPosts() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  const filtered = allPosts.filter(post => {
    const matchCat   = activeFilter === "all" || post.category === activeFilter;
    const matchQuery = !query ||
      post.title.toLowerCase().includes(query) ||
      post.content.toLowerCase().includes(query);
    return matchCat && matchQuery;
  });
  render(filtered);
}

function render(posts) {
  const container = document.getElementById("blog-container");
  const counter   = document.getElementById("post-count");
  container.innerHTML = "";

  counter.textContent = `${posts.length} post${posts.length !== 1 ? "s" : ""}`;

  if (posts.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No posts match your search.";
    container.appendChild(empty);
    return;
  }

  const from = sessionStorage.getItem("entryPoint") || "blog";

  posts.forEach(post => {
    const card = document.createElement("div");
    card.className = "card";

    const badge = document.createElement("span");
    badge.className = "cat-badge";
    badge.textContent = post.category;

    const date = document.createElement("span");
    date.textContent = post.date;

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.append(badge, date);

    const title = document.createElement("div");
    title.className = "post-title";
    title.textContent = post.title;

    const excerpt = document.createElement("div");
    excerpt.className = "excerpt";
    excerpt.textContent = post.content.substring(0, 140) + "…";

    const link = document.createElement("a");
    link.className = "read-link";
    link.href = `blog-post.html?id=${encodeURIComponent(post.id)}&from=${encodeURIComponent(from)}`;
    link.textContent = "Read more →";

    card.append(meta, title, excerpt, link);
    container.appendChild(card);
  });
}

loadPosts();
</script>

</body>
</html>
